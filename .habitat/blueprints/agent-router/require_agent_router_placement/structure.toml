schemaVersion = 1

[[scopes]]
name = "workspace-package-router"
root = "."
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "application-package-routers"
root = "apps/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "service-package-routers"
root = "services/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "api-server-plugin-package-routers"
root = "plugins/server/api/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "workflow-plugin-package-routers"
root = "plugins/async/workflows/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]
allowEmpty = true

[[scopes]]
name = "schedule-plugin-package-routers"
root = "plugins/async/schedules/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]
allowEmpty = true

[[scopes]]
name = "command-plugin-package-routers"
root = "plugins/cli/commands/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "agent-plugin-package-routers"
root = "plugins/agents/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "web-plugin-package-routers"
root = "plugins/web/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]
allowEmpty = true

[[scopes]]
name = "generic-package-routers"
root = "packages/!(*.*|adapters)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "adapter-package-routers"
root = "packages/adapters/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]
allowEmpty = true

[[scopes]]
name = "resource-package-routers"
root = "resources/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "provider-package-routers"
root = "resources/!(*.*)/providers/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "tool-package-routers"
root = "tools/!(*.*)"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "habitat-consumer-router"
root = "scripts/habitat"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]

[[scopes]]
name = "nx-admission-router"
root = "scripts/nx"
kind = "directory"
mode = "open"
required = ["AGENTS.md"]
