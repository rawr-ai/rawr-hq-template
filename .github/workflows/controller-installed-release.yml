name: Installed Controller Release

on:
  workflow_dispatch:

concurrency:
  group: installed-controller-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: darwin
            architecture: arm64
          - runner: macos-15-intel
            platform: darwin
            architecture: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            architecture: arm64
          - runner: ubuntu-24.04
            platform: linux
            architecture: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Check out exact main revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up pinned controller runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install locked dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build installed controller
        shell: bash
        run: |
          set -euo pipefail
          data_root="$RUNNER_TEMP/rawr-controller"
          mkdir -p "$data_root" "$RUNNER_TEMP/controller-assets"
          bun scripts/controller/cli-build-production.ts install \
            --data-root "$data_root" \
            --bun-binary "$(command -v bun)" \
            --no-global-alias \
            --json > "$RUNNER_TEMP/controller-install.json"
          bun scripts/controller/distribute-installed.ts \
            --data-root "$data_root" \
            --output-directory "$RUNNER_TEMP/controller-assets" \
            --source-revision "$GITHUB_SHA"

      - name: Prove repository-independent installed controller
        shell: bash
        env:
          EXPECTED_PLATFORM: ${{ matrix.platform }}
          EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
        run: |
          set -euo pipefail
          asset_name="rawr-controller-$EXPECTED_PLATFORM-$EXPECTED_ARCHITECTURE"
          archive="$RUNNER_TEMP/controller-assets/$asset_name.tar"
          sidecar="$RUNNER_TEMP/controller-assets/$asset_name.provenance.json"
          export ARCHIVE="$archive"
          export SIDECAR="$sidecar"
          bun -e '
            import { createHash } from "node:crypto";
            import { createReadStream } from "node:fs";
            import { stat } from "node:fs/promises";
            import {
              INSTALLED_CONTROLLER_ASSET_RECIPE,
              InstalledControllerProvenanceSchema,
            } from "./scripts/controller/lib/installed-controller-asset.ts";
            import { Value } from "typebox/value";
            const archive = process.env.ARCHIVE;
            const sidecar = process.env.SIDECAR;
            const sourceRevision = process.env.GITHUB_SHA;
            const platform = process.env.EXPECTED_PLATFORM;
            const architecture = process.env.EXPECTED_ARCHITECTURE;
            if (!archive || !sidecar || !sourceRevision || !platform || !architecture) {
              throw new Error("installed controller proof environment is incomplete");
            }
            const provenance = JSON.parse(await Bun.file(sidecar).text());
            if (!Value.Check(InstalledControllerProvenanceSchema, provenance)) {
              throw new Error("installed controller provenance does not match its TypeBox schema");
            }
            const hash = createHash("sha256");
            for await (const chunk of createReadStream(archive)) hash.update(chunk);
            const archiveStatus = await stat(archive);
            const expectedFileName = `rawr-controller-${platform}-${architecture}.tar`;
            if (
              provenance.sourceRevision !== sourceRevision
              || provenance.platform !== platform
              || provenance.architecture !== architecture
              || provenance.archive?.fileName !== expectedFileName
              || provenance.archive?.byteLength !== archiveStatus.size
              || provenance.archive?.sha256 !== hash.digest("hex")
              || provenance.recipe !== `${INSTALLED_CONTROLLER_ASSET_RECIPE}@${sourceRevision}`
            ) {
              throw new Error("installed controller provenance does not match its archive or build tuple");
            }
          '

          extraction_root="$RUNNER_TEMP/controller-extracted"
          foreign_cwd="$RUNNER_TEMP/foreign-cwd"
          test ! -e "$extraction_root"
          test ! -e "$foreign_cwd"
          mkdir "$extraction_root" "$foreign_cwd"
          extraction_root="$(cd "$extraction_root" && pwd -P)"
          foreign_cwd="$(cd "$foreign_cwd" && pwd -P)"
          export EXTRACTION_ROOT="$extraction_root"
          tar -xf "$archive" -C "$extraction_root"

          checkout="$GITHUB_WORKSPACE"
          hidden_checkout="$RUNNER_TEMP/source-checkout-hidden"
          test -d "$checkout"
          test ! -e "$hidden_checkout"
          restore_checkout() {
            if test ! -d "$hidden_checkout"; then
              echo "cannot restore source checkout: hidden checkout is absent" >&2
              return 1
            fi
            if test -e "$checkout"; then
              echo "cannot restore source checkout: original path was recreated" >&2
              return 1
            fi
            mv "$hidden_checkout" "$checkout"
          }
          trap restore_checkout EXIT
          cd "$RUNNER_TEMP"
          mv "$checkout" "$hidden_checkout"
          test ! -e "$checkout"
          (
            cd "$foreign_cwd"
            test ! -e "$checkout"
            RAWR_DATA_DIR="$extraction_root" \
              PATH="$extraction_root/controller/bin:$PATH" \
              "$extraction_root/controller/bin/rawr" doctor global --json \
              > "$RUNNER_TEMP/controller-doctor.json"
          )
          export DOCTOR_REPORT="$RUNNER_TEMP/controller-doctor.json"
          bun -e '
            const provenancePath = process.env.SIDECAR;
            const reportPath = process.env.DOCTOR_REPORT;
            const extractionRoot = process.env.EXTRACTION_ROOT;
            if (!provenancePath || !reportPath || !extractionRoot) {
              throw new Error("controller doctor proof paths are missing");
            }
            const provenance = JSON.parse(await Bun.file(provenancePath).text());
            const report = JSON.parse(await Bun.file(reportPath).text());
            const digest = provenance.controllerDigest;
            if (
              report.ok !== true
              || report.data?.healthy !== true
              || report.data?.dataRoot?.realpath !== extractionRoot
              || report.data?.selector?.status !== "valid"
              || report.data?.selector?.controllerDigest !== digest
              || report.data?.invocation?.controllerDigest !== digest
              || report.data?.release?.status !== "verified"
              || report.data?.release?.controllerDigest !== digest
              || report.data?.release?.sourceRevision !== provenance.sourceRevision
              || report.data?.release?.runtime?.platform !== provenance.platform
              || report.data?.release?.runtime?.architecture !== provenance.architecture
              || report.data?.release?.runtime?.version !== provenance.runtime?.version
              || report.data?.release?.runtime?.revision !== provenance.runtime?.revision
            ) {
              throw new Error("extracted controller did not report its selected verified digest");
            }
          '
          test ! -e "$checkout"
          restore_checkout
          test -d "$checkout"
          test ! -e "$hidden_checkout"
          trap - EXIT

      - name: Upload immutable installed controller asset
        uses: actions/upload-artifact@v4
        with:
          name: controller-${{ matrix.platform }}-${{ matrix.architecture }}
          path: ${{ runner.temp }}/controller-assets/*
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download exact platform assets
        uses: actions/download-artifact@v4
        with:
          pattern: controller-*
          path: assets
          merge-multiple: true

      - name: Verify closed release asset set
        shell: bash
        run: |
          set -euo pipefail
          test -f assets/rawr-controller-darwin-arm64.tar
          test -f assets/rawr-controller-darwin-arm64.provenance.json
          test -f assets/rawr-controller-darwin-x64.tar
          test -f assets/rawr-controller-darwin-x64.provenance.json
          test -f assets/rawr-controller-linux-arm64.tar
          test -f assets/rawr-controller-linux-arm64.provenance.json
          test -f assets/rawr-controller-linux-x64.tar
          test -f assets/rawr-controller-linux-x64.provenance.json
          test "$(find assets -maxdepth 1 -type f -name 'rawr-controller-*.tar' | wc -l | tr -d ' ')" = "4"
          test "$(find assets -maxdepth 1 -type f -name 'rawr-controller-*.provenance.json' | wc -l | tr -d ' ')" = "4"
          test "$(find assets -maxdepth 1 -type f | wc -l | tr -d ' ')" = "8"
          cd assets
          export LC_ALL=C
          sha256sum rawr-controller-*.tar rawr-controller-*.provenance.json > SHA256SUMS

      - name: Require immutable controller release policy
        env:
          CONTROLLER_RELEASE_ADMIN_READ_TOKEN: ${{ secrets.CONTROLLER_RELEASE_ADMIN_READ_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if test -z "${CONTROLLER_RELEASE_ADMIN_READ_TOKEN:-}"; then
            echo "CONTROLLER_RELEASE_ADMIN_READ_TOKEN is required to verify repository immutable releases" >&2
            exit 1
          fi
          immutable_enabled="$(
            GH_TOKEN="$CONTROLLER_RELEASE_ADMIN_READ_TOKEN" gh api \
              --method GET \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/immutable-releases" \
              --jq '.enabled'
          )"
          if test "$immutable_enabled" != "true"; then
            echo "refusing to publish without repository immutable releases enabled" >&2
            exit 1
          fi

      - name: Create non-overwriting controller release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: controller-${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "refusing to replace existing installed controller release: $TAG" >&2
            exit 1
          fi
          tag_refs="$(
            gh api \
              --method GET \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/$TAG"
          )"
          tag_exists="$(
            jq -r --arg ref "refs/tags/$TAG" 'any(.[]; .ref == $ref)' <<<"$tag_refs"
          )"
          if test "$tag_exists" != "false"; then
            echo "refusing to reuse existing installed controller tag: $TAG" >&2
            exit 1
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Installed controller $GITHUB_SHA" \
            --notes "Verified installed-controller assets built from Template main revision $GITHUB_SHA." \
            assets/SHA256SUMS \
            assets/rawr-controller-*.tar \
            assets/rawr-controller-*.provenance.json

          expected_assets="$(printf '%s\n' \
            SHA256SUMS \
            rawr-controller-darwin-arm64.provenance.json \
            rawr-controller-darwin-arm64.tar \
            rawr-controller-darwin-x64.provenance.json \
            rawr-controller-darwin-x64.tar \
            rawr-controller-linux-arm64.provenance.json \
            rawr-controller-linux-arm64.tar \
            rawr-controller-linux-x64.provenance.json \
            rawr-controller-linux-x64.tar \
            | jq -R -s 'split("\n") | map(select(length > 0)) | sort')"
          published="$(
            gh release view "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets,isDraft,isImmutable,tagName,targetCommitish
          )"
          if ! jq -e \
            --arg tag "$TAG" \
            --arg target "$GITHUB_SHA" \
            --argjson expectedAssets "$expected_assets" \
            '
              .isDraft == false
              and .isImmutable == true
              and .tagName == $tag
              and .targetCommitish == $target
              and ([.assets[].name] | sort) == $expectedAssets
            ' <<<"$published" >/dev/null
          then
            echo "published controller release does not match the immutable closed release contract" >&2
            exit 1
          fi
          published_commit="$(
            gh api \
              --method GET \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/commits/$TAG" \
              --jq '.sha'
          )"
          if test "$published_commit" != "$GITHUB_SHA"; then
            echo "published controller tag resolves to $published_commit, expected $GITHUB_SHA" >&2
            exit 1
          fi
